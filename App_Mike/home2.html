<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!--Attiva tutte le classi grafiche-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
    
        <link rel="stylesheet" href="style.css">
    
        <script src="auth.js"></script>
    
    <style>
        /* 
           NOTA: Gli stili strutturali sono in style.css.
           Qui rimangono solo gli stili UNICI per la Home Page.
        */

        /* --- MAIN CONTENT (Override specifico) --- */
        .main-content {
            background: linear-gradient(180deg, #1e3264 0%, #121212 300px); /*180deg = sfumatura dall'alto verso il basso*/
        }

        .top-navbar {
            position: sticky; top: 0; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(20px); 
            padding: 12px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .top-search-bar { flex-grow: 0; width: 360px; position: relative;} 

        /*flex-grow: Se si trova all'interno di un contenitore "Flexbox" che ha dello spazio vuoto extra, la barra di ricerca rimarrà della sua dimensione originale invece di allungarsi*/
        .top-search-input { width: 100%; background-color: #2a2a2a; border: 1px solid transparent; border-radius: 500px; padding: 10px 45px; color: white; font-size: 0.9rem; transition: 0.3s; }
        .search-icon-inside { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #b3b3b3; font-size: 1.1rem; }

        .content-padding { padding: 20px 32px; }

        /* Shortcuts & Cards */
        .shortcut-card { background-color: rgba(255,255,255,0.1); border-radius: 4px; display: flex; align-items: center; overflow: hidden; cursor: pointer; transition: 0.3s; margin-bottom: 16px; } /*overflow:hidden per tagliare il testo che esce fuori se eventualmente troppo lungo*/
        .shortcut-card:hover { background-color: rgba(255,255,255,0.2); }
        .shortcut-img { width: 80px; height: 80px; object-fit: cover; box-shadow: 5px 0 10px rgba(0,0,0,0.3); } /*object-fit: l'immagine riempie tutto lo spazio senza deformarsi*/
        .shortcut-text { padding: 0 16px; font-weight: bold; color: white; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } /*text-overflow: se il testo è troppo lungo, mostra "..." alla fine*/
        
        .section-title { color: white; font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; margin-top: 30px; cursor: default; }
        
        .music-card { background-color: #181818; padding: 16px; border-radius: 6px; transition: background-color 0.3s ease; cursor: pointer; height: 100%; }
        .music-card:hover { background-color: #282828; }
        .music-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .card-title-text { color: white; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } /*white-space: nowrap - impedisce il testo di andare a capo*/
        .card-desc-text { color: #a7a7a7; font-size: 0.85rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar d-none d-md-flex flex-column" id="global-sidebar-container"></div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="top-search-bar d-none d-md-block">
                <i class="fas fa-search search-icon-inside"></i>
                <input type="text" class="top-search-input" id="searchInput" placeholder="Cosa vuoi ascoltare?" onkeypress="handleSearch(event)">
            </div>
            <div id="userArea" class="d-flex justify-content-end align-items-center" style="width: 200px;"> 
                <a href="profilo/login.html" class="btn btn-light rounded-pill px-4 fw-bold">Accedi</a>
            </div>
        </div>

        <div class="content-padding">
            <h2 class="text-white fw-bold mb-3">Per te</h2>
            <div id="container-shortcuts" class="row g-3 mb-4"><p class="text-secondary">Caricamento...</p></div>
            
            <div class="section-title mb-3">Brani consigliati per te</div>
            <div id="container-consigliati" class="row row-cols-2 row-cols-md-3 row-cols-lg-6 g-3 mb-5"><p class="text-secondary">Caricamento...</p></div>
            
            <div class="section-title mb-3">Le hit del momento</div>  
            <div id="container-hits" class="row row-cols-2 row-cols-md-3 row-cols-lg-6 g-3 mb-5"><p class="text-secondary">Caricamento...</p></div>
            <div style="height: 50px;"></div>
        </div> 
    </div> 
</div> 

<div id="global-player-container"></div>

<!--modale Salva in playlist-->
<div class="modal fade" id="saveModal" tabindex="-1" aria-hidden="true"> <!--modal fade = APPARIZIONE del modale con animazione in dissolvenza-->
    <div class="modal-dialog modal-dialog-centered"> <!--modal-dialog modal-dialog-centered = POSIZIONE a centro schermo-->
        <div class="modal-content bg-dark text-white"> <!--modal-content = CONTENITORE del modale (contiene header e body)-->
            <div class="modal-header border-secondary"> 
                <h5 class="modal-title">Salva in playlist</h5> 
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body"><ul class="list-group list-group-flush" id="modalPlaylistList"></ul></div>
        </div>
    </div>
</div> 

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> <!--carica la libreria associata all'interattività-->
<script>
    // --- FUNZIONE RICERCA ---
    function handleSearch(event) {
        if (event.key === "Enter") {
            const query = document.getElementById('searchInput').value;
            if (query.trim() !== "") {
                // Reindirizza alla pagina di ricerca passando la query
                window.location.href = `playlist/ricerca.html?q=${encodeURIComponent(query)}`;
            }
        }
    }

    // --- CARICAMENTO CONTENUTI ---
    async function loadShortcuts() {
        const container = document.getElementById("container-shortcuts");
        try {
            const token = await window.getAccessToken();
            if(!token) throw new Error("Token non disponibile");

            const response = await fetch(`https://api.spotify.com/v1/search?q=$?q=Mix%20Daily%202024&type=track&limit=3`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await response.json();
            
            container.innerHTML = ""; 

            //preleva i dati per traccia
            data.tracks.items.forEach(track => { //data.tracks.items è un array di tracce
                const imgUrl = track.album.images[0]?.url || 'https://placehold.co/100'; //immagine di default se non disponibile l'url
                const artistName = track.artists[0].name;
                const releaseYear = track.album.release_date.split('-')[0];
                const artistId = track.artists[0].id;
                const duration = track.duration_ms;

            //preoara la griglia
                const col = document.createElement("div");
                col.className = "col-12 col-md-6 col-lg-4";

            //li inserisce nel container
                col.innerHTML = `
                    <div class="shortcut-card">
                        <img src="${imgUrl}" class="shortcut-img" alt="${track.name}">
                        <div class="shortcut-text">${track.name}</div>
                    </div>
                `;
                // Aggiunge l'evento di click ad ogni card

                col.querySelector('.shortcut-card').addEventListener('click', () => {
                    window.selezionaBrano(imgUrl, track.name, artistName, releaseYear, artistId, track.album.name, duration);
                });

                container.appendChild(col);
            });

        } catch (error) {
            console.error("Errore caricamento shortcuts", error);
            container.innerHTML = "<p>Impossibile caricare i suggerimenti.</p>";
        }
    }

    //crea le sezioni consigliati e hits
    async function loadSection(query, containerId) {
        const container = document.getElementById(containerId);
        try {
            const token = await window.getAccessToken();
            if(!token) throw new Error("Token non disponibile");

            const response = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=6`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await response.json();
            
            container.innerHTML = "";

            data.tracks.items.forEach(track => {
                const imgUrl = track.album.images[0]?.url || 'https://placehold.co/300';
                const artistName = track.artists[0].name;
                const releaseYear = track.album.release_date.split('-')[0];
                const artistId = track.artists[0].id;
                // RECUPERO DURATA (MS)
                const duration = track.duration_ms;

                const col = document.createElement("div");
                col.className = "col";
                col.innerHTML = `
                    <div class="music-card">
                        <img src="${imgUrl}" alt="${track.name}">
                        <div class="card-title-text">${track.name}</div>
                        <div class="card-desc-text">${artistName}</div>
                    </div>
                `;

                // Aggiunge l'evento di click ad ogni card
                col.querySelector('.music-card').addEventListener('click', () => {
                    // Passiamo duration e un genere di default
                    window.selezionaBrano(imgUrl, track.name, artistName, releaseYear, artistId, track.album.name, duration);
                });

                container.appendChild(col);
            });

        } catch (error) {
            console.error("Errore caricamento sezione " + containerId, error);
            container.innerHTML = "<p>Errore caricamento.</p>";
        }
    }

    // --- CARICAMENTO AVVIO ---
    window.onload = function() {
        loadShortcuts(); 
        loadSection("Alex Jean", "container-consigliati"); 
        loadSection("Top 50", "container-hits");
        
        // Login Check
        const utente = window.getCurrentUser(); 
        
        if (utente) {
            const displayName = utente.username || utente.nome || utente.email;
            
            document.getElementById("userArea").innerHTML = `
                <div class="dropdown">
                    <button class="btn btn-dark rounded-pill fw-bold dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" style="background-color: #000; border: none;">
                        <div style="width: 28px; height: 28px; background-color: #535353; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-user" style="font-size: 0.8rem;"></i>
                        </div>
                        <span>${displayName}</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow-lg" style="background-color: #282828;">
                        <li><a class="dropdown-item" href="profilo/profilo.html">Profilo</a></li>
                        <li><hr class="dropdown-divider border-secondary"></li>
                        <li><a class="dropdown-item" href="#" onclick="window.logout()">Esci</a></li>
                    </ul>
                </div>`;
        }
    };
</script>

<script src="layout.js"></script>
</body>
</html>
