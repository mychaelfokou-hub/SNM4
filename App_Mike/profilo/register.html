<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Registrazione - Spotify App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        .register-box {
            background-color: #181818;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="register-box">
        <img src="../images/spotify.png" alt="Spotify Logo" style="width: 200px;">
        <h2><b>Iscriviti per iniziare ad ascoltare</b></h2>
        <br>
        <input type="text" id="username" class="form-control my-2" placeholder="Nome utente (min. 3 caratteri)">
        <input type="email" id="email" class="form-control my-2" placeholder="Email">
        <input type="password" id="password" class="form-control my-2" placeholder="Password (min. 8 caratteri, 1 numero)">
        <button class="btn btn-success w-100" onclick="register()">Crea account</button>
        <p class="mt-3">Hai già un account? <a href="login.html" class="text-success">Accedi</a></p>
    </div>

    <script>
        function register() {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            // --- VALIDAZIONI REGEX (Nuove aggiunte) ---

            // 1. Regex Email: Controlla formato standard (testo@dominio.est)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            // 2. Regex Password: Minimo 8 caratteri, almeno una lettera e almeno un numero
            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

            // 3. Regex Username: Almeno 3 caratteri, solo lettere e numeri (niente spazi/simboli)
            const usernameRegex = /^[a-zA-Z0-9]{3,}$/;


            // --- CONTROLLI ---

            if (!username || !email || !password) {
                alert("Compila tutti i campi.");
                return;
            }

            if (!usernameRegex.test(username)) {
                alert("Il nome utente deve avere almeno 3 caratteri e contenere solo lettere o numeri.");
                return;
            }

            if (!emailRegex.test(email)) {
                alert("Inserisci un indirizzo email valido.");
                return;
            }

            if (!passwordRegex.test(password)) {
                alert("La password deve essere lunga almeno 8 caratteri, senza spazi e contenere almeno un numero.");
                return;
            }

            // --- LOGICA DI SALVATAGGIO ---

            const utenti = JSON.parse(localStorage.getItem("utenti")) || []; //creo l'array e lo riempio solo se c'è qualcosa, ma al primo giro è vuoto quindi utenti è creato successivamente

            // Controllo email già registrata
            const esiste = utenti.find(u => u.email === email);
            if (esiste) {
                alert("Email già registrata.");
                return;
            }

            const newUser = {
                username,
                email,
                password,
                preferences: "", 
                artistaPreferito: "" 
            };

            //DOPPIO SALVATAGGIO
            // 1. Salva nel database utenti (LocalStorage)
            utenti.push(newUser);
            localStorage.setItem("utenti", JSON.stringify(utenti));

            // 2. Login automatico immediato (SessionStorage)
            sessionStorage.setItem("utenteLoggato", JSON.stringify(newUser));

            alert("Account creato con successo! Ora imposta le tue preferenze.");
            
            // 3. Reindirizza alla pagina preferenze
            window.location.href = "preferenze.html";
        }
    </script>
</body>

</html>
