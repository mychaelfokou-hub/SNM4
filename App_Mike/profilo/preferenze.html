<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Le tue preferenze - Spotify App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <script src="../auth.js"></script>

    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        .register-box {
            background-color: #181818;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .form-select, .form-control {
            background-color: #2a2a2a;
            border: none;
            color: white;
            margin-bottom: 10px;
        }
        
        .form-control::placeholder { color: #b3b3b3; }
    </style>
</head>

<body>
    <div class="register-box">
        <h2 class="mb-4"><b>Raccontaci i tuoi gusti</b></h2>
        <p class="text-secondary mb-4">Scegli la tua musica preferita per personalizzare l'esperienza.</p>
        
        <label class="text-start w-100 mb-1 text-light">Genere preferito:</label>
        <div class="mb-3">
            <select class="form-select" id="preferences" data-bs-theme="dark">
                <option value="" disabled selected>Seleziona un genere...</option>
                <option value="Hip-hop">Hip-hop</option>
                <option value="Afrobeats">Afrobeats</option>
                <option value="Pop">Pop</option>
                <option value="Rock">Rock</option>
            </select>
        </div>

        <label class="text-start w-100 mb-1 text-light mt-2">Artista preferito:</label>
        <input type="text" id="artistInput" class="form-control my-2" placeholder="Es. Måneskin, Drake...">

        <button class="btn btn-success w-100 mt-4 py-2 fw-bold rounded-pill" onclick="savePreferences()">Continua</button>
    </div>

    <script>
        function savePreferences() {
            const genre = document.getElementById("preferences").value;
            const artist = document.getElementById("artistInput").value.trim();

            if (!genre || !artist) {
                alert("Per favore, seleziona un genere e scrivi un artista.");
                return;
            }

            // --- TRIPLO SALVATAGGIO PREFERENZE ---
            //sessionStorage
            let currentUser = window.getCurrentUser(); 
            if (currentUser) {
                currentUser.preferences = genre;
                currentUser.artistaPreferito = artist;
                sessionStorage.setItem("utenteLoggato", JSON.stringify(currentUser)); /*1. nella sessione corrente*/
            //localStorage
                let allUsers = JSON.parse(localStorage.getItem("utenti")) || [];
                let index = allUsers.findIndex(u => u.email === currentUser.email);
                if (index !== -1) {
                    allUsers[index].preferences = genre;
                    allUsers[index].artistaPreferito = artist;
                    localStorage.setItem("utenti", JSON.stringify(allUsers)); /*2. nella memoria globale*/
                }
            }
            //memoria isolata specifica per preferenze 
            const userPrefs = { genre: genre, artist: artist };
            window.saveUserData('preferenze', userPrefs);  

            alert("Preferenze salvate! Benvenuto.");
            window.location.href = "../home2.html";
        }
        /*NOTA
        Per sincronizzare i dati, bisogna salvarli in tre posti diversi:
        1. sessionStorage (sessione corrente)   
        2. localStorage (database globale)
        3. memoria isolata (preferenze specifiche)
        */
    </script>
</body>
</html>
