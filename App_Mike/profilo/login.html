<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Login - Spotify</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <script src="../auth.js"></script> 
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Circular Std', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        .login-box {
            background-color: #181818;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 60px rgba(0,0,0,0.5);
        }
        
        .form-control {  /*NON clicco sul FORM*/
            background-color: #2a2a2a;
            border: 1px solid transparent;
            color: white; 
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            background-color: #333;
            color: white;  /*Clicco sul FORM*/
            border-color: #1db954;
            box-shadow: none;
        }

        .btn-login {
            background-color: #1db954;
            border: none;
            border-radius: 500px;
            padding: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .btn-login:hover {
            background-color: #1ed760;
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <div class="login-box">
        <img src="../images/spotify.png" alt="Spotify Logo" style="width: 160px; margin-bottom: 30px;">
        <h3 class="fw-bold mb-4">Accedi a Spotify</h3>
        
        <div class="text-start">
            <label class="form-label ms-1 small fw-bold text-secondary">EMAIL</label>
            <input type="email" id="email" class="form-control" placeholder="Inserisci la tua email">
            
            <label class="form-label ms-1 small fw-bold text-secondary">PASSWORD</label>
            <input type="password" id="password" class="form-control" placeholder="Password">
        </div>

        <button class="btn btn-success w-100 btn-login mt-3" onclick="eseguiLogin()">ACCEDI</button>
        
        <hr class="border-secondary my-4">
        
        <p class="mb-0 text-secondary">Non hai un account?</p>
        <a href="register.html" class="text-white fw-bold text-decoration-underline">ISCRIVITI A SPOTIFY</a>
    </div>

    <script>
        function eseguiLogin() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!email || !password) {
                alert("Inserisci Email e Password.");
                return;
            }

            // Chiama la funzione centralizzata in auth.js
            // Se restituisce false, significa che le credenziali sono errate
            if (!window.login(email, password)) {
                alert("Credenziali non valide o account inesistente.");
            }
        }
    </script>
</body>
</html>
